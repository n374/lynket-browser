name: Build APK

# Master 上的 CI：现代化(PR176)基线自带 vendored 的 dev.arunkumar.* 源码，
# 无需复活外部私有依赖，直接 JDK 17 + Android SDK 编译出 debug APK 并上传。
#
# Master CI: the modernized (PR176) baseline vendors the dev.arunkumar.* sources,
# so no external private-dep resurrection is needed — just build the debug APK.
#
# 注：这条 workflow 取代了上游那份 jobs 全被注释掉的 android.yml（无有效 job →
# 每次 push 立即失败）。

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

jobs:
  build-debug-apk:
    name: Build debug APK
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('android-app/**/*.gradle*', 'android-app/**/libs.versions.toml') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Build debug APK
        working-directory: android-app
        run: |
          set -euxo pipefail
          chmod +x gradlew
          ./gradlew --no-daemon --stacktrace :lynket:assembleDebug

      - name: Upload debug APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: lynket-debug-apk
          path: android-app/lynket/build/outputs/apk/debug/*.apk
          if-no-files-found: error
