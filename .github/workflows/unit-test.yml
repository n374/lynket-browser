name: Unit Test

# 跑 lynket 的 JVM 单元测试。与 build-apk.yml 一样，先把上游 base-android 的私有依赖
# (dev.arunkumar.android:*) 从源码 publishToMavenLocal 复活，再执行 testDebugUnitTest。
# 手动触发（workflow_dispatch）即可；用于验证 RAS-55 等新增单测在干净环境下确实通过。
#
# Run lynket JVM unit tests. Like build-apk.yml, resurrect the upstream base-android
# private deps via publishToMavenLocal first, then run testDebugUnitTest.

on:
  # push 触发不要求工作流存在于默认分支（workflow_dispatch 则要求），故加 push 以便在特性分支直接跑。
  push:
    branches:
      - feature/55-native-bubble-cct
  workflow_dispatch:

jobs:
  unit-test:
    name: Run JVM unit tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout (fork)
        uses: actions/checkout@v4

      - name: Set up JDK 11
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '11'

      - name: Cache Gradle & Maven Local
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
            ~/.m2/repository
          key: ${{ runner.os }}-gradle-${{ hashFiles('android-app/**/*.gradle*', 'android-app/**/libs.versions.toml') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Resurrect base-android deps (publishToMavenLocal)
        run: |
          set -euxo pipefail
          # 见 build-apk.yml 的同名步骤：base-android 私有快照仓已清空，只能从源码本地发布，
          # 且必须带 -Psnapshot 才会发布成 master-SNAPSHOT 版本以匹配 lynket 的依赖坐标。
          BASE_ANDROID_REF=9380452
          git clone https://github.com/arunkumar9t2/base-android.git "$RUNNER_TEMP/base-android"
          cd "$RUNNER_TEMP/base-android"
          git checkout "$BASE_ANDROID_REF"
          sed -i 's|^  configureSigning()|  // configureSigning() disabled in CI (no signing keys for local publish)|' \
            build-logic/src/main/kotlin/publish/PublishingLibrary.kt
          chmod +x gradlew
          ./gradlew --no-daemon --stacktrace -Psnapshot \
            :common:publishToMavenLocal \
            :dagger-base:publishToMavenLocal \
            :logging:publishToMavenLocal \
            :dagger-viewmodel:publishToMavenLocal \
            :epoxy-utils:publishToMavenLocal \
            :rx-utils:publishToMavenLocal

      - name: Run unit tests
        working-directory: android-app
        run: |
          set -euxo pipefail
          chmod +x gradlew
          # 作用域到 RAS-55 的纯逻辑单测：绿灯即证明「整个 test 源集编译通过（含刚修复的 Dagger 测试图）
          # + 本 UT 通过」。其余历史 Robolectric 测试的运行期健康属独立问题，本工作流不为其背书。
          ./gradlew --no-daemon --stacktrace :lynket:testDebugUnitTest \
            --tests "arun.com.chromer.bubbles.system.BubbleTargetResolverTest"

      - name: Upload test report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: lynket-unit-test-report
          path: android-app/lynket/build/reports/tests/testDebugUnitTest
          if-no-files-found: warn
